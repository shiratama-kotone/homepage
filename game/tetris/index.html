<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TETRIS (SRS & T-Spin)</title>

<link rel="stylesheet" href="/style/style.css">
<link rel="stylesheet" href="tetris.css">
<link rel="icon" href="https://shiratama-kotone.wikidot.com/local--favicon/favicon.gif?86564">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XGM94MF3RY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XGM94MF3RY');

<body>

<div id="header"></div>

<div class="content">

<h1>TETRIS (SRS & T-Spin)</h1>

<div class="tetrisgame-layout-wrapper">
  <div class="tetrisgame-side-column">
    <div class="card">
      <div class="tetrisgame-status-label">HOLD</div>
      <canvas id="tetrisgame-hold-canvas" width="100" height="100"></canvas>
    </div>
    <div class="card">
      <div class="tetrisgame-status-label">SCORE</div>
      <div class="tetrisgame-status-value" id="tetrisgame-score-val">0</div>
      <div class="tetrisgame-status-label">LINES</div>
      <div class="tetrisgame-status-value" id="tetrisgame-lines-val">0</div>
      <div class="tetrisgame-status-label">LEVEL</div>
      <div class="tetrisgame-status-value" id="tetrisgame-level-val">1</div>
    </div>
  </div>

  <div class="card tetrisgame-main-board-card">
    <canvas id="tetrisgame-main-canvas" width="300" height="600"></canvas>
  </div>

  <div class="tetrisgame-side-column">
    <div class="card">
      <div class="tetrisgame-status-label">NEXT</div>
      <canvas id="tetrisgame-next-canvas" width="100" height="100"></canvas>
    </div>
    <div class="card">
      <div class="tetrisgame-status-label">LOG</div>
      <div class="tetrisgame-log-display" id="tetrisgame-log-msg">-</div>
    </div>
    <button class="tetrisgame-action-button" id="tetrisgame-start-btn">START</button>
  </div>
</div>

<div class="card tetrisgame-instructions-panel">
  <strong style="font-size: 1rem;">操作方法</strong>
  <div class="tetrisgame-instructions-grid">
    <div><strong>← / → :</strong> 左右移動</div>
    <div><strong>↑ / X :</strong> 右回転</div>
    <div><strong>↓ :</strong> ソフトドロップ</div>
    <div><strong>Z :</strong> 左回転</div>
    <div><strong>Space :</strong> ハードドロップ</div>
    <div><strong>C / Shift :</strong> ホールド</div>
  </div>
</div>

</div>

<div id="footer"></div>

<script src="/script/script.js"></script>
<script src="tetris.js"></script>

</body>
</html>
