/style/style.css?v=1.0.1<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TJA画像化ツール</title>

<link rel="stylesheet" href="/style/style.css">
<link rel="icon" href="https://shiratama-kotone.wikidot.com/local--favicon/favicon.gif?86564">

<link rel="stylesheet" href="/style/tools.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XGM94MF3RY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XGM94MF3RY');
</script>
<body>

<div id="header"></div>

<div class="content">

<section class="pane-left">

<div class="area is-titled area-editor">
<h2 class="title">エディター</h2>

<div class="controls">
<div style="float:left">
<label>
<input class="editor-live" type="checkbox" checked>
リアルタイム編集を有効にする
</label>
</div>

<div style="float:right">
<button class="editor-process">プロセス</button>
</div>
</div>

<div class="content">
<textarea class="tja-input"></textarea>
</div>
</div>

<div class="area is-titled area-errors">
<h2 class="title">Errors</h2>

<div class="content">
<div class="errors"></div>
</div>
</div>

</section>

<section class="pane-right">

<div class="area area-controls">

<div class="controls-diff" style="float:left">
<span class="button btn-diff-0 is-hidden" data-value="0">かんたん</span>
<span class="button btn-diff-1 is-hidden" data-value="1">ふつう</span>
<span class="button btn-diff-2 is-hidden" data-value="2">むずかしい</span>
<span class="button btn-diff-3 is-hidden" data-value="3">おに</span>
<span class="button btn-diff-4 is-hidden" data-value="4">おに(裏)</span>
</div>

<div class="controls-page" style="float:right">
<span class="button btn-page-preview" data-value="preview">プレビュー</span>
<span class="button btn-page-statistics" data-value="statistics">統計</span>
</div>

</div>

<div class="area area-pages">

<div class="page page-preview"></div>

<div class="page page-statistics">

<h3>統計</h3>

<h4>最大コンボ数</h4>
<p><code class="stat-total-combo"></code></p>

<h4>天井スコア</h4>
<p><code class="stat-max-score"></code></p>

<h4>ドン・カツ</h4>
<p>
<span class="is-color-don">
小 <code class="stat-don-small"></code>
+
大 <code class="stat-don-big"></code>
</span>
/
<span class="is-color-kat">
小 <code class="stat-kat-small"></code>
+
大 <code class="stat-kat-big"></code>
</span>
=
<code class="is-color-don stat-don"></code>
/
<code class="is-color-kat stat-kat"></code>
(
<code class="is-color-don stat-don-ratio"></code>
/
<code class="is-color-kat stat-kat-ratio"></code>
)
</p>

<h4>平均密度</h4>
<p>
<code class="stat-density"></code>
打/秒
(演奏時間
<code class="stat-length"></code>
秒)
</p>

<h4>連打</h4>
<p>
<code class="stat-renda"></code>
=
合計
<code class="stat-renda-total"></code>
秒
</p>

<h4>風船</h4>
<p><code class="stat-balloon"></code></p>

<h3>グラフ</h3>
<svg class="stat-graph"></svg>

</div>

</div>

</section>

</div>

<div id="footer"></div>

<script src="/script/tools/tja-img-1.js"></script>
<script src="/script/tools/tja-img-2.js"></script>
<script src="/script/script.js"></script>

</body>
</html>
