<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chatwork Client</title>

<link rel="stylesheet" href="/style/style.css">
<link rel="stylesheet" href="/style/tool.css"
<link rel="icon" href="https://shiratama-kotone.wikidot.com/local--favicon/favicon.gif?86564">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XGM94MF3RY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XGM94MF3RY');

<body>

<div id="header"></div>

<div class="content">

<h1>Chatwork Client</h1>

<div class="box">
  <input id="token" placeholder="APIキー">
  <button onclick="saveToken()">保存</button>
</div>

<hr>

<div class="layout">

  <div class="sidebar">
    <h3>ルーム</h3>
    <button onclick="loadRooms()">更新</button>
    <div id="rooms"></div>
  </div>

  <div class="chat">

    <h3>メッセージ</h3>

    <div id="messages"></div>

    <div class="sendbox">
      <input id="sendText" placeholder="メッセージ">
      <button onclick="sendMessage()">送信</button>
    </div>

  </div>

</div>

</div>

<div id="footer"></div>

<script src="/script/script.js"></script>
<script src="/script/tools/chatwork.js"></script>

</body>
</html>
