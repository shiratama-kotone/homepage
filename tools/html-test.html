<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML試しツール</title>

<link rel="stylesheet" href="/style/style.css">
<link rel="icon" href="https://shiratama-kotone.wikidot.com/local--favicon/favicon.gif?86564">

<style>
.editor {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  height: 70vh;
}

textarea {
  width: 100%;
  height: 100%;
  resize: none;
  font-family: monospace;
}

iframe {
  width: 100%;
  height: 100%;
  border: 1px solid #ccc;
  background: white;
}
</style>
</head>
<body>

<div id="header"></div>

<div class="content">

<h1>HTML試しサイト</h1>

<div class="editor">
  <textarea id="code"><h1>こんにちは！</h1>

<p>ここにHTMLを書いてね！</p>

<button onclick="alert('やっほー')">
クリック
</button></textarea>

  <iframe id="preview"></iframe>
</div>

</div>

<div id="footer"></div>

<script src="/script/script.js"></script>

<script>
var code = document.getElementById("code");
var preview = document.getElementById("preview");

function updatePreview() {
  preview.srcdoc = code.value;
}

code.addEventListener("input", updatePreview);

updatePreview();
</script>

</body>
</html>
