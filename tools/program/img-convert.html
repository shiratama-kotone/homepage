<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>画像変換ツール</title>

<link rel="icon" href="/favicon.ico">

<link rel="stylesheet" href="/style/style.css">
<link rel="stylesheet" href="/style/tools.css">

</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XGM94MF3RY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XGM94MF3RY');
</script>

<body>

<div id="header">
<header>
<h1>画像変換ツール</h1>

<nav>
<a href="/">ホーム</a>
</nav>

</header>
</div>


<main class="content">


<section class="card tool-box">

<h2>画像を選択</h2>

<input 
type="file" 
id="imageInput" 
accept="image/*"
>


<div class="image-preview">

<img id="preview" alt="プレビュー">

</div>

</section>



<section class="card tool-box">

<h2>変換設定</h2>


<label>
変換先形式
</label>


<select id="format">

<option value="png">
PNG
</option>

<option value="jpeg">
JPEG
</option>

<option value="webp">
WEBP
</option>

<option value="bmp">
BMP
</option>

</select>



<label>
画質
</label>


<input 
type="range"
id="quality"
min="0.1"
max="1"
step="0.1"
value="0.9"
>


<span id="qualityText">
0.9
</span>



<br><br>


<button id="convert">
変換する
</button>


<a id="download">
ダウンロード
</a>


</section>




<section class="card tool-box">

<h2>変換結果</h2>


<div class="image-preview">

<img id="result" alt="変換結果">

</div>


</section>


</main>



<div id="footer">

<footer>

<p>
画像変換ツール
</p>

</footer>

</div>



<script src="/script/script.js"></script>

</body>
</html>
