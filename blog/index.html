/style/style.css?v=1.0.1<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ブログ</title>

<link rel="stylesheet" href="/style/style.css">
<link rel="stylesheet" href="/style/blog.css">
</head>
<!-- Google tag (gtag.js) -->

<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-XGM94MF3RY');

<body>

<div class="content">

<h1>ブログ</h1>

<input id="search" placeholder="検索" />

<div id="list"></div>

<a href="/blog/profile.html">ゆゆゆのプロフィール</a>

</div>

<script src="/blog/posts.js"></script>
<script src="/script/script.js"></script>

<script>
function render(data){
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {
    const el = document.createElement("div");
    el.className = "blog-entry";

    el.innerHTML = `
      <h2><a href="${p.url}">${p.title}</a></h2>
      <p class="date">${p.date}</p>
      <p>${p.desc}</p>
      <p class="tags">#${p.tags.join(" #")}</p>
    `;

    list.appendChild(el);
  });
}

posts.sort((a,b)=>b.date.localeCompare(a.date));
render(posts);

// 検索
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value;

  const filtered = posts.filter(p =>
    p.title.includes(q) ||
    p.desc.includes(q) ||
    p.tags.join(" ").includes(q)
  );

  render(filtered);
});
</script>

</body>
</html>
