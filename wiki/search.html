<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>検索結果 - ゆゆゆWiki</title>

<link rel="stylesheet" href="/style/style.css">
<link rel="icon" href="https://shiratama-kotone.wikidot.com/local--favicon/favicon.gif?86564">
</head>
<body>

<div id="header"></div>

<div class="content">

<h1>検索結果</h1>

<p id="searchQuery"></p>

<div id="results"></div>

</div>

<div id="footer"></div>

<script src="/script/script.js"></script>
<script>

var params = new URLSearchParams(location.search);
var q = (params.get("q") || "").trim();

document.getElementById("searchQuery").textContent =
  "検索ワード: " + q;

fetch("/wiki/pages.json")
.then(r => r.json())
.then(pages => {

  var lowerQ = q.toLowerCase();

  var exactMatch = pages.find(page =>
    page.title.toLowerCase() === lowerQ
  );

  if (exactMatch) {
    location.replace(exactMatch.url);
    return;
  }

  var matched = pages.filter(page => {

    var titleMatch =
      page.title.toLowerCase().includes(lowerQ);

    var descriptionMatch =
      page.description.toLowerCase().includes(lowerQ);

    var tagMatch =
      page.tags.some(tag =>
        tag.toLowerCase().includes(lowerQ)
      );

    return (
      titleMatch ||
      descriptionMatch ||
      tagMatch
    );
  });

  var results = document.getElementById("results");

  if (!matched.length) {
    results.innerHTML =
      "<p>該当するページはありません。</p>";
    return;
  }

  results.innerHTML = matched.map(page => `
    <a href="${page.url}" class="wiki-result">
      <h2>${page.title}</h2>
      <p>${page.description}</p>
      <small>${page.tags.join(" / ")}</small>
    </a>
  `).join("");

});

</script>
</body>
</html>
