<form id="wiki-search">
  <input
    type="text"
    id="searchInput"
    placeholder="ページ名・説明・タグを検索"
  >
  <button type="submit">検索</button>
</form>
</div>

<section>

</div>

<div id="footer"></div>

<script src="/script/script.js"></script>
<script>
    document.getElementById("wiki-search")?.addEventListener("submit", e => {
  e.preventDefault();

  var q = document.getElementById("searchInput").value.trim();

  if (!q) return;

  location.href =
    "/wiki/search.html?q=" +
    encodeURIComponent(q);
});
</script>
</body>
